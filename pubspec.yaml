name: cat_health
description: 고양이 캣타워 체중 건강 모니터링 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.2
  path: ^1.9.0
  fl_chart: ^0.68.0
  provider: ^6.1.2
  intl: ^0.19.0
  flutter_blue_plus: ^1.31.8
  permission_handler: ^11.3.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/Logo_image.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
